<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <title>MTTS-JS TTS</title>
    <link rel="stylesheet" href="style.css">
<style>
    .interact:hover {
        background-color: #ddd;
        transition: .15s;
    }
</style>

</head>

<body class="h-12 w-5xl m-4 box-border outline-none select-none border-none font-[Nunito] text-gray-700">
    <div class="flex">
        <a class="rounded-3xl h-12 aspect-square mr-4" draggable="false" href="">
            <img src="assets/icon.png" draggable="false" alt="mtts-icon" style="width: 100%; height: 100%;">
        </a>
        <div id="dragArea" class="hover:bg-gray-300 transition-[.2s] svg rounded-3xl h-12 w-12 [-webkit-app-region:drag] flex justify-center items-center bg-white cursor-pointer mr-4">
            <img src="assets/drag.svg" draggable="false" alt="drag button" class="w-8 h-8">
        </div>
        <button id="settingsBtn" class="svg hover:bg-gray-300 transition-[.2s] cursor-pointer rounded-3xl h-12 w-12 bg-white mr-4 flex justify-center items-center">
            <img src="assets/settings.svg" draggable="false" alt="settings button" class="w-8 h-8">
        </button>
        <input id="textArea" class="rounded-3xl mr-4 bg-white no-outline flex justify-center items-center px-4 grow outline-none text-[20px]" placeholder="Enter text to synthesize...">
        <button id="submitBtn" class="hover:bg-gray-300 transition-[.2s] svg bg-white rounded-3xl flex justify-center items-center h-12 w-12 cursor-pointer">
            <img src="assets/rocket.svg" draggable="false" alt="send button" class="w-8 h-8">
        </button>
        <button id="closeBtn" class="bg-white rounded-3xl w-5 h-5 ml-2 font-bold cursor-pointer hover:bg-gray-300 transition-[.2s] text-[14px]">
            X
        </button>
    </div>

    <script type="module" src="/renderer.ts"></script>
</body>
</html>
