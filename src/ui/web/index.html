<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Moon-TTS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-bar">
        <a class="icon-link" draggable="false" title="About" target="_blank" href="https://github.com/EzeRodas/MTTS-PY" id="About">
            <img src="assets/icon.png" draggable="false" alt="mtts-icon">
        </a>
        <div id="dragArea" class="btn drag-handle disabled">
            <img src="assets/drag.svg" draggable="false" alt="drag">
        </div>
        <button id="settingsBtn" class="btn" disabled>
            <img src="assets/settings.svg" draggable="false" alt="settings">
        </button>
        <input id="textArea" class="text-input"  maxlength="500" placeholder="Initializing TTS engine... Please wait a moment." disabled>
        <button id="submitBtn" class="btn" disabled>
            <img src="assets/rocket.svg" draggable="false" alt="send">
        </button>
        <button id="stopBtn" class="btn" disabled>
            <img src="assets/stop.svg" draggable="false" alt="stop">
        </button>
        <button id="closeBtn" class="close-btn">X</button>
    </div>

    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="dist/main_bundle.js"></script>
</body>
</html>
