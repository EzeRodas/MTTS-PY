<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-layout">
        <div class="settings-container" id="quickSettings">
            <div class="settings-header">
                <h2>Quick settings</h2>
                <div class="header-buttons">
                    <button id="expandSettingsBtn" class="settings-expand-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="settings-expand-btn">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                            <path d="M16 4l4 0l0 4" />
                            <path d="M14 10l6 -6" />
                            <path d="M8 20l-4 0l0 -4" />
                            <path d="M4 20l6 -6" />
                            <path d="M16 20l4 0l0 -4" />
                            <path d="M14 14l6 6" />
                            <path d="M8 4l-4 0l0 4" />
                            <path d="M4 4l6 6" />
                        </svg>
                    </button>
                    <button id="closeSettingsBtn" class="settings-close-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-x">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                            <path d="M18 6l-12 12" />
                            <path d="M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        <!-- Model and Voice -->
        <div class="settings-section">
            <div class="settings-row">
                <h4>Model</h4>
                <select id="modelSelector"></select>
            </div>
            <div class="settings-row">
                <h4>Voice</h4>
                <select id="voiceSelector"></select>
            </div>
        </div>
        <!-- Output -->
        <div class="settings-section">
            <div class="settings-row">
                <h4>Output</h4>
                <label class="toggle-label">
                    <input type="checkbox" class="toggle-input" id="outputCheckbox">
                    <div class="toggle-track"></div>
                    <span class="toggle-dot"></span>
                </label>
            </div>
            <select id="outputSelector" class="full-width"></select>
            <div class="volume-row">
                <input id="outputSlider" type="range" value="50">
                <img src="assets/volume.svg" alt="volume">
            </div>
        </div>
        <!-- Monitoring -->
        <div class="settings-section">
            <div class="settings-row">
                <h4>Monitoring</h4>
                <label class="toggle-label">
                    <input type="checkbox" class="toggle-input" id="monitoringCheckbox">
                    <div class="toggle-track"></div>
                    <span class="toggle-dot"></span>
                </label>
            </div>
            <select id="monitoringSelector" class="full-width"></select>
            <div class="volume-row">
                <input id="monitoringSlider" type="range" value="50">
                <img src="assets/volume.svg" alt="volume">
            </div>
        </div>
        </div>
        <div class="advanced-panel" id="advancedPanel">
            <iframe id="advancedFrame" src="about:blank"></iframe>
        </div>
    </div>

    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="dist/settings_bundle.js"></script>
</body>
</html>
