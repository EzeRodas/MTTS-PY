<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <title>Settings</title>
<style>
    @font-face {
        font-family: Nunito;
        src: url(./assets/Nunito-VariableFont_wght-CfknUHFh.ttf);
    }
    #closeSettingsBtn {
        cursor: pointer;
        font-weight: bold;
        background: none;
        font-size: 1.2rem;
        -webkit-app-region: no-drag;
    }
</style>
  <script type="module" crossorigin src="./assets/settings-DnEuCSwr.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/style-BVeqBY8v.css">
</head>
<body class="box-border select-none m-0 border-none outline-none font-[Nunito] text-gray-700">
    <div class="rounded-3xl w-screen h-screen bg-white/90">
        <div class="w-full p-4 flex justify-between">
            <h2 class="text-2xl font-bold">
                Settings
            </h2>
            <button id="closeSettingsBtn">X</button>
        </div>
        <!-- Model and Voice selector -->
        <div class="mx-4 mt-2 p-4 bg-white rounded-3xl"> 
            <!-- Model -->
            <div class="flex justify-between mb-3">
                <h4>Model:</h4>
                <select name="modelSelector" id="modelSelector" class="bg-white rounded-lg w-48 outline-gray-200 outline-1"></select>
            </div>
            <!-- Voice -->
            <div class="flex justify-between">
                <h4>Voice:</h4>
                <select name="voiceSelector" id="voiceSelector" class="bg-white rounded-lg w-48 outline-gray-200 outline-1"></select>
            </div>
        </div>
        <!-- Output and volume controls -->
        <!-- Output -->
        <div class="mx-4 mt-4 p-4 bg-white rounded-3xl">
            <div class="flex justify-between mb-3">
                <h4>Output</h4>
                <!-- Checkbox -->
                <div>
                    <label class="relative inline-flex items-center cursor-pointer text-gray-900 gap-3">
                        <input type="checkbox" class="sr-only peer" />
                        <div class="w-10 h-6 bg-neutral-300 rounded-full peer peer-checked:bg-indigo-500 transition-colors duration-200"></div>
                        <span class="dot absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-200 ease-in-out peer-checked:translate-x-4"></span>
                    </label>
                </div>
            </div>
            <!-- Device Selector -->
            <div>
                <select name="outputSelector" id="outputSelector" class="bg-white mb-3 rounded-lg w-full outline-gray-200 outline-1"></select>
            </div>
            <!-- Volume Slider -->
            <input id="default-range" type="range" value="50" class="w-full h-2 rounded-full bg-neutral-300 accent-indigo-500 cursor-pointer outline-none hover:accent-indigo-500">
        </div>
        <!-- Monitoring -->
        <div class="mx-4 mt-4 p-4 bg-white rounded-3xl">
            <div class="flex justify-between mb-3">
                <h4>Monitoring</h4>
                <!-- Checkbox -->
                <div>
                    <label class="relative inline-flex items-center cursor-pointer text-gray-900 gap-3">
                        <input type="checkbox" class="sr-only peer" />
                        <div class="w-10 h-6 bg-neutral-300 rounded-full peer peer-checked:bg-indigo-500 transition-colors duration-200"></div>
                        <span class="dot absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-200 ease-in-out peer-checked:translate-x-4"></span>
                    </label>
                </div>
            </div>
            <!-- Device Selector -->
            <div>
                <select name="outputSelector" id="outputSelector" class="bg-white mb-3 rounded-lg w-full outline-gray-200 outline-1"></select>
            </div>
            <!-- Volume Slider -->
            <input id="default-range" type="range" value="50" class="w-full h-2 rounded-full bg-neutral-300 accent-indigo-500 cursor-pointer outline-none hover:accent-indigo-500">
        </div>
    </div>
    <!-- Settings will go here -->
</body>
</html>
