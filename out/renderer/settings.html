<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>Settings</title>
<style>
    @font-face {
        font-family: Nunito;
        src: url(./assets/Nunito-VariableFont_wght-CfknUHFh.ttf);
    }
    #closeSettingsBtn {
        cursor: pointer;
        font-weight: bold;
        background: none;
        font-size: 1.2rem;
        -webkit-app-region: no-drag;
    }
</style>
  <script type="module" crossorigin src="./assets/settings-qvOdg2rF.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/style-CivF_ugr.css">
</head>
<body class="box-border select-none m-0 border-none outline-none font-[Nunito] text-gray-700">
    <div class="rounded-3xl w-screen h-screen bg-white/90">
        <div class="w-full p-3.5 flex justify-between bg-white shadow rounded-t-3xl">
            <h2 class="text-2xl font-bold">
                Quick settings
            </h2>
            <button id="closeSettingsBtn" class="mr-2">X</button>
        </div>
        <!-- Model and Voice selector -->
        <div class="mx-4 mt-5 p-4 bg-white rounded-3xl shadow"> 
            <!-- Model -->
            <div class="flex justify-between mb-3">
                <h4 class="font-bold">Model</h4>
                <select name="modelSelector" id="modelSelector" class="bg-white rounded-lg w-48 outline-gray-300 outline-1"></select>
            </div>
            <!-- Voice -->
            <div class="flex justify-between">
                <h4 class="font-bold">Voice</h4>
                <select name="voiceSelector" id="voiceSelector" class="bg-white rounded-lg w-48 outline-gray-300 outline-1"></select>
            </div>
        </div>
        <!-- Output and volume controls -->
        <!-- Output -->
        <div class="mx-4 mt-4 p-4 bg-white rounded-3xl shadow">
            <div class="flex justify-between mb-3  items-center ml-1">
                <h4 class="font-bold">Output</h4>
                <!-- Checkbox -->
                <div>
                    <label class="relative inline-flex items-center cursor-pointer text-gray-900 gap-3">
                        <input type="checkbox" class="sr-only peer" id="outputCheckbox"/>
                        <div class="w-10 h-6 bg-neutral-300 rounded-full peer peer-checked:bg-indigo-500 transition-colors duration-200"></div>
                        <span class="dot absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-200 ease-in-out peer-checked:translate-x-4"></span>
                    </label>
                </div>
            </div>
            <!-- Device Selector -->
            <div>
                <select name="outputSelector" id="outputSelector" class="bg-white mb-3 rounded-lg w-full outline-gray-300 outline-1"></select>
            </div>
            <!-- Volume Slider -->
             <div class="flex items-center justify-center w-full gap-1">
                 <!-- <img src="assets/mute.svg" alt="mute-vol"> -->
                 <input id="outputSlider" type="range" value="50" class="w-full h-2 rounded-full bg-neutral-300 accent-indigo-500 cursor-pointer outline-none hover:accent-indigo-500">
                 <img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='24'%20height='24'%20viewBox='0%200%2024%2024'%20fill='none'%20stroke='%23555'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%20class='icon%20icon-tabler%20icons-tabler-outline%20icon-tabler-volume'%3e%3cpath%20stroke='none'%20d='M0%200h24v24H0z'%20fill='none'%20/%3e%3cpath%20d='M15%208a5%205%200%200%201%200%208'%20/%3e%3cpath%20d='M17.7%205a9%209%200%200%201%200%2014'%20/%3e%3cpath%20d='M6%2015h-2a1%201%200%200%201%20-1%20-1v-4a1%201%200%200%201%201%20-1h2l3.5%20-4.5a.8%20.8%200%200%201%201.5%20.5v14a.8%20.8%200%200%201%20-1.5%20.5l-3.5%20-4.5'%20/%3e%3c/svg%3e" alt="max-vol">
             </div>
        </div>
        <!-- Monitoring -->
        <div class="mx-4 mt-4 p-4 bg-white rounded-3xl shadow">
            <div class="flex justify-between mb-3 items-center ml-1">
                <h4 class="font-bold">Monitoring</h4>
                <!-- Checkbox -->
                <div>
                    <label class="relative inline-flex items-center cursor-pointer text-gray-900 gap-3">
                        <input type="checkbox" class="sr-only peer" id="monitoringCheckbox"/>
                        <div class="w-10 h-6 bg-neutral-300 rounded-full peer peer-checked:bg-indigo-500 transition-colors duration-200"></div>
                        <span class="dot absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-200 ease-in-out peer-checked:translate-x-4"></span>
                    </label>
                </div>
            </div>
            <!-- Device Selector -->
            <div>
                <select name="monitoringSelector" id="monitoringSelector" class="bg-white mb-3 rounded-lg w-full outline-gray-300 outline-1"></select>
            </div>
            <!-- Volume Slider -->
             <div class="flex items-center justify-center w-full gap-1">
                <!-- <img src="assets/mute.svg" alt="mute-vol"> -->
                <input id="monitoringSlider" type="range" value="50" class="w-full h-2 rounded-full bg-neutral-300 accent-indigo-500 cursor-pointer outline-none hover:accent-indigo-500">
                <img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='24'%20height='24'%20viewBox='0%200%2024%2024'%20fill='none'%20stroke='%23555'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%20class='icon%20icon-tabler%20icons-tabler-outline%20icon-tabler-volume'%3e%3cpath%20stroke='none'%20d='M0%200h24v24H0z'%20fill='none'%20/%3e%3cpath%20d='M15%208a5%205%200%200%201%200%208'%20/%3e%3cpath%20d='M17.7%205a9%209%200%200%201%200%2014'%20/%3e%3cpath%20d='M6%2015h-2a1%201%200%200%201%20-1%20-1v-4a1%201%200%200%201%201%20-1h2l3.5%20-4.5a.8%20.8%200%200%201%201.5%20.5v14a.8%20.8%200%200%201%20-1.5%20.5l-3.5%20-4.5'%20/%3e%3c/svg%3e" alt="max-vol">
             </div>
        </div>
    </div>
    <!-- Settings will go here -->
</body>
</html>
